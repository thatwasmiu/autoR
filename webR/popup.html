<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>R Web Auto Clicker</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 12px;
        min-width: 220px;
      }
      label {
        display: block;
        font-size: 12px;
        margin-bottom: 4px;
        color: #333;
      }
      input {
        box-sizing: border-box;
        width: 100%;
        padding: 6px 8px;
        margin-bottom: 10px;
      }
      button {
        width: 100%;
        padding: 8px 12px;
        cursor: pointer;
      }
      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #444;
      }
      #status.error {
        color: #b00020;
      }
      #birthday {
        display: none;
        margin-bottom: 10px;
        padding: 8px;
        text-align: center;
        font-weight: 600;
        color: #6b21a8;
        background: #f3e8ff;
        border-radius: 6px;
      }
      #birthday.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <h3>Cấu hình</h3>
    <p id="birthday" role="status"></p>
    <label for="scriptUrl">Apps Script Web App URL</label>
    <input
      id="scriptUrl"
      type="url"
      value="https://script.google.com/macros/s/AKfycby_XxGnTT1NjgSS_rF27FIVZLSw9NHO2uihMrAqc-Kvoy-jBHSer-JEW0-HdlgXnR22Vg/exec"
      autocomplete="off"
      spellcheck="false"
    />
    <label for="invoice">Số định danh</label>
    <input
      id="invoice"
      type="text"
      value="4601609273"
      autocomplete="off"
      spellcheck="false"
    />
    <label for="formConfigs">
      <div>Configs:</div>
      <div>target: 0 - XHK / 1 - KBC</div>
      <div>type: 0 - Nhập khẩu / 1 - Xuất khẩu / 2 - Nội địa</div>
      <div>runs: Số lần chạy</div>
    </label>
    <textarea
      id="formConfigs"
      rows="5"
      spellcheck="false"
      style="font-family: ui-monospace, monospace; font-size: 11px"
    >[{"target":"0","type":"0","runs":3}]</textarea>
    <button id="run" type="button">Run webR</button>
    <button id="reset" type="button">Reset configs</button>
    <p id="status"></p>
    <script src="secrets.js"></script>
    <script src="formConfig.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
